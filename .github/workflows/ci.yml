name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `pnpm gate` incluye `pnpm test:e2e` (suite humo de Playwright, §7.B/§8.7 del contrato P3):
      # el navegador DEBE estar instalado o el gate fallaría en CI. Se instala explícitamente aquí
      # (con dependencias del SO) para que los e2e formen parte del gate obligatorio y no puedan
      # saltarse en silencio — mismo principio anti-falso-verde que el guard del binario de PB.
      - name: Install Playwright browser (Chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: Download PocketBase binary (contract suite, versión pineada)
        run: pnpm pb:download

      # `pnpm pb:download` falla en silencio (éxito de proceso) si la descarga no funciona,
      # y en ese caso la suite de contrato contra PB real se auto-salta (describe.skip).
      # Esta comprobación evita un falso verde: si el binario no está listo, el job falla aquí
      # en vez de dejar pasar un `pnpm gate` que nunca ejerció PB real.
      - name: Verify PocketBase binary is present and executable
        run: |
          if [ ! -x .pbbin/pocketbase ]; then
            echo "::error::.pbbin/pocketbase no existe o no es ejecutable tras 'pnpm pb:download'." \
              "La suite de contrato contra PB real se saltaría silenciosamente y el gate daría un falso verde." \
              "Revisa la conectividad a GitHub Releases o el script scripts/download-pocketbase.mjs."
            exit 1
          fi

      - name: Run gate (check + lint + test + build + e2e)
        run: pnpm gate

      # P8·F1 (D-P8.6 opción A / L-P8.9): `pnpm gate` ya corrió `pnpm build` (deja `build/`
      # listo), así que el presupuesto de bundle se comprueba justo después, sin repetir el
      # build. Aditivo: si esto falla, el job de gate falla con él (mismo criterio que el resto
      # de pasos obligatorios), pero no cambia nada de lo que `pnpm gate` ya hacía.
      - name: Check bundle gzip budget
        run: pnpm check-bundle-budget

  # P8·F1 (D-P8.7 opción B): la suite de contrato contra PB real (ya ejercida arriba, en `gate`,
  # con la versión PINEADA) se repite aquí en MATRIZ contra el rango soportado completo —
  # mínimo (0.26.0, D-P1.3) y pineada (0.39.6) — para cazar diferencias de API entre versiones
  # de PocketBase. Job separado (no una matriz dentro de `gate`) para no acoplar el resultado de
  # esta comprobación de RANGO con el gate obligatorio de cada PR.
  pb-contract-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pb_version: ['0.26.0', '0.39.6']
    # HALLAZGO (P8·F1, 2026-07-19) resuelto: la causa raíz NO era un problema de shape/formato
    # del harness (la hipótesis inicial de "kitchen_sink se crea con solo el campo id" era un
    # espejismo — un `pb_migrations` acumulado de sesiones locales anteriores, ver
    # `pb-harness/server.ts`). La causa real: el TIPO de campo `geoPoint` (usado solo por
    # `kitchen_sink.location`, para probar que Vega degrada tipos exóticos a `unsupported`) no
    # existe en el servidor hasta PocketBase v0.27.0 (CHANGELOG oficial) — 0.26.0 devuelve 400
    # "invalid formatting" al intentar crearlo, porque ni reconoce el tipo. Como ninguna
    # instalación 0.26.0 real puede tener jamás un campo `geoPoint`, el harness ahora omite ese
    # campo al sembrar contra servidores < 0.27.0 (`pb-harness/seed.ts`) y los 2 casos de
    # contrato que dependen de él se saltan declarándolo (`ContractOptions.hasGeoPointFieldType`
    # en `backend-contract.ts`) — el resto de la suite (CRUD/query/auth/ensureCollections) ya
    # pasaba sin tocar nada, confirmando que D-P1.3 (mínimo soportado 0.26.0) sigue siendo
    # correcto. `continue-on-error` ya no hace falta: los 54 tests pasan de verdad contra 0.26.0.
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download PocketBase binary (${{ matrix.pb_version }})
        env:
          PB_VERSION: ${{ matrix.pb_version }}
        run: pnpm pb:download

      # Mismo guard anti-falso-verde que en `gate` (L-P8.5): un binario ausente FALLA aquí,
      # nunca se salta en silencio la comprobación de esta versión de la matriz.
      - name: Verify PocketBase binary is present and executable
        run: |
          if [ ! -x .pbbin/pocketbase ]; then
            echo "::error::.pbbin/pocketbase no existe o no es ejecutable tras 'pnpm pb:download' (PB_VERSION=${{ matrix.pb_version }})." \
              "La suite de contrato contra PB real se saltaría silenciosamente." \
              "Revisa la conectividad a GitHub Releases o el script scripts/download-pocketbase.mjs."
            exit 1
          fi

      - name: Run contract suite against PocketBase ${{ matrix.pb_version }}
        run: pnpm exec vitest run tests/contract/pocketbase.contract.test.ts
